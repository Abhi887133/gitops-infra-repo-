apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: canary-web-app
  namespace: staging
spec:
  replicas: 5                    # 5 replicas make it very easy to visualize a 20% traffic split (1 pod)
  strategy:
    canary:
      steps:
      - setWeight: 20            # Step 1: Shift 20% (1 pod) of traffic to the new version
      - pause: {duration: 40s}   # Step 2: Pause for 40 seconds to watch for failures/ImagePullBackOffs
      - setWeight: 60            # Step 3: Automatically scale up to 60% traffic (3 pods) if healthy
      - pause: {duration: 20s}   # Step 4: Pause for 20 seconds
                                 # Step 5: Automatically scale up to 100%
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: canary-web-app
  template:
    metadata:
      labels:
        app: canary-web-app
    spec:
      containers:
      - name: web
        image: nginx:1.25-alpine  # Our starting stable version (v1.25)
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: canary-web-service
  namespace: staging
spec:
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: canary-web-app
