apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: staging-web-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Abhi887133/gitops-infra-repo-.git
    targetRevision: HEAD
    path: guestbook
  destination:
    server: https://kubernetes.default.svc
    namespace: staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
